services:
  rabbitmq:
    container_name: rabbitmq_container
    image: rabbitmq:4.0-management-alpine
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=pdf
      - RABBITMQ_DEFAULT_PASS=api
    ports:
      - '5672:5672'
      - '15672:15672'
   
  
  redis:
    container_name: redis_container
    image: redis:8-alpine
    restart: always
    ports:
      - '6379:6379'
    command: redis-server --loglevel warning
    volumes:
      - redis_data:/data
   
  mongodb:
    container_name: mongodb_container
    image: mongo:latest
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
   
volumes:
  redis_data:
  mongodb_data:
